name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]      # Запускается при пуше в main
  pull_request:
    branches: [ "main" ]      # Запускается при создании PR

jobs:
  build-and-push:
    runs-on: ubuntu-latest    # Используем виртуальную машину с Ubuntu

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/fastapi-todos-compose:latest
            ${{ secrets.DOCKER_USERNAME }}/fastapi-todos-compose:${{ github.sha }}